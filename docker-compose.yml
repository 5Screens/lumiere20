version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lumiere-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumiere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumiere_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lumiere_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumiere} -d ${POSTGRES_DB:-lumiere_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumiere-network

  # Backend API
  backend:
    build:
      context: ./backend-v2
      dockerfile: Dockerfile
    container_name: lumiere-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lumiere}:${POSTGRES_PASSWORD:-lumiere_secret}@postgres:5432/${POSTGRES_DB:-lumiere_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://lumiere.mindcentra.com}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lumiere-network

  # Frontend (IT Portal)
  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: lumiere-frontend
    restart: unless-stopped
    networks:
      - lumiere-network

  # Portal Runner (End User Portal)
  portal:
    build:
      context: ./portal-runner-v2
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: lumiere-portal
    restart: unless-stopped
    networks:
      - lumiere-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lumiere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - portal
    networks:
      - lumiere-network

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: lumiere-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:

networks:
  lumiere-network:
    driver: bridge
